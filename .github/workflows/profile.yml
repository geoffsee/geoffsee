name: Metrics
on:
  # Schedule daily updates
  schedule: [{ cron: "0 0 * * *" }]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: { branches: ["master", "main"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      # PAT as the profile user (optional but recommended for Search API / GraphQL).
      # If unset, the default repo token is used; --login uses the repo owner, not `gh api user`.
      - name: Generate profile readme and metrics SVG
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          bun scripts/gh-profile-stats.ts \
            --login "${{ github.repository_owner }}" \
            --downloads

      - name: Commit metrics and README
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md github-metrics.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update metrics and profile readme"
            git push
          fi
