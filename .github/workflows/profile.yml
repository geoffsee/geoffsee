name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, repositories
          plugin_lines: yes
          plugin_stars: yes
          plugin_lines_delay: 30
          plugin_stars_limit: 3
          plugin_lines_sections: base
          filename: github-metrics.svg
          output_action: none

      - name: Assemble README with bio
        run: |
          set -euo pipefail
          cp /metrics_renders/github-metrics.svg ./github-metrics.svg
          {
            echo '![Stats](/github-metrics.svg)'
            echo ''
            cat assets/bio.md
          } > README.md

      - name: Commit metrics and README
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md github-metrics.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update metrics and profile readme"
            git push
          fi

